<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 相機框</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    .camera-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .overlay-frame {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
    }

    .snap-btn {
      position: absolute;
      bottom: 40px;
      z-index: 3;
      padding: 16px 36px;
      font-size: 18px;
      font-weight: bold;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      cursor: pointer;
      active { transform: scale(0.96); }
    }

    /* 照片預覽浮層 (全螢幕) */
    #preview-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #preview-img {
      max-width: 90%;
      max-height: 75vh;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.8);
      object-fit: contain;
    }

    .tip-text {
      color: #fff;
      font-size: 14px;
      margin-top: 12px;
      opacity: 0.8;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .action-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      border: none;
      cursor: pointer;
    }

    .save-btn { background-color: #007aff; color: #fff; }
    .retake-btn { background-color: #333; color: #fff; }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="webcam" autoplay playsinline muted></video>
    <img id="frame" class="overlay-frame" src="your-frame.png" alt="Frame Overlay">
    <button class="snap-btn" onclick="takePhoto()">📷 拍照</button>
  </div>

  <!-- 照片預覽 modal -->
  <div id="preview-container">
    <img id="preview-img" alt="Captured Photo">
    <p class="tip-text">💡 可點擊「儲存/分享」或長按照片存入相簿</p>
    <div class="btn-group">
      <button class="action-btn retake-btn" onclick="closePreview()">重新拍攝</button>
      <button class="action-btn save-btn" onclick="savePhoto()">儲存 / 分享照片</button>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('webcam');
    const frame = document.getElementById('frame');
    const canvas = document.getElementById('canvas');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    let currentBlob = null;

    // 啟動相機
    async function initCamera() {
      const constraintsList = [
        { video: { facingMode: { ideal: "environment" } }, audio: false },
        { video: { facingMode: "user" }, audio: false },
        { video: true, audio: false }
      ];

      for (let constraints of constraintsList) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          return;
        } catch (err) {
          console.warn("相機啟動嘗試失敗:", err);
        }
      }
      alert("無法讀取相機，請檢查 Safari 的相機權限是否已開啟！");
    }

    // 拍照合成
    function takePhoto() {
      if (!video.videoWidth) {
        alert("相機未就緒，請稍後再試！");
        return;
      }

      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // 1. 畫相機
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      // 2. 畫 PNG 相框
      context.drawImage(frame, 0, 0, canvas.width, canvas.height);

      // 轉為 Base64 供預覽
      const dataUrl = canvas.toDataURL('image/png');
      previewImg.src = dataUrl;
      previewContainer.style.display = 'flex';

      // 轉為 Blob 供原生分享 / 下載使用
      canvas.toBlob((blob) => {
        currentBlob = blob;
      }, 'image/png');
    }

    // 關閉預覽重新拍攝
    function closePreview() {
      previewContainer.style.display = 'none';
    }

    // 儲存照片（優先調用 iOS 原生選單）
    async function savePhoto() {
      if (!currentBlob) return;

      const file = new File([currentBlob], photo_${Date.now()}.png, { type: 'image/png' });

      // 如果瀏覽器支援 Web Share API (iOS Safari 支援)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '我的相片',
            text: '這是我用相機框拍攝的照片！'
          });
        } catch (err) {
          if (err.name !== 'AbortError') {
            fallbackDownload();
          }
        }
      } else {
        fallbackDownload();
      }
    }

    // 傳統下載（備用）
    function fallbackDownload() {
      const a = document.createElement('a');
      a.href = previewImg.src;
      a.download = photo_${Date.now()}.png;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    window.addEventListener('load', initCamera);
  </script>
</body>
</html>
