<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 相機框</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    
    .camera-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    /* 確保 video 畫面在最下層但看得見 */
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* PNG 外框疊在 video 上面 */
    .overlay-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
      pointer-events: none; /* 讓點擊穿透 */
    }

    /* 快門按鈕在最上層 */
    .snap-btn {
      position: absolute;
      bottom: 40px;
      z-index: 10;
      padding: 16px 36px;
      font-size: 18px;
      font-weight: bold;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .snap-btn:active { transform: scale(0.95); }

    /* 全螢幕預覽彈窗 */
    #preview-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #preview-img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.8);
      object-fit: contain;
      -webkit-touch-callout: default;
    }

    .tip-text {
      color: #ccc;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .action-btn {
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      border: none;
      cursor: pointer;
    }

    .save-btn { background-color: #007aff; color: #fff; }
    .retake-btn { background-color: #333; color: #fff; }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="webcam" autoplay playsinline webkit-playsinline muted></video>
    <img id="frame" class="overlay-frame" src="your-frame.png" alt="Frame Overlay">
    <button class="snap-btn" onclick="takePhoto()">📷 拍照</button>
  </div>

  <div id="preview-container">
    <img id="preview-img" alt="Captured Photo">
    <p class="tip-text">💡 點「儲存照片」選單或直接<b>長按照片</b>存入相簿</p>
    <div class="btn-group">
      <button class="action-btn retake-btn" onclick="closePreview()">重新拍攝</button>
      <button class="action-btn save-btn" onclick="savePhoto()">儲存 / 分享照片</button>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('webcam');
    const frame = document.getElementById('frame');
    const canvas = document.getElementById('canvas');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    let currentBlob = null;

    // 簡化且高成功率的相機啟動邏輯
    async function initCamera() {
      const constraintsList = [
        { video: { facingMode: "environment" }, audio: false }, // 後置鏡頭
        { video: { facingMode: "user" }, audio: false },        // 前置鏡頭
        { video: true, audio: false }                           // 任意鏡頭
      ];

      for (let constraints of constraintsList) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          
          // 強制觸發 play() 防止 Safari 畫面卡在黑色
          await video.play();
          return;
        } catch (err) {
          console.warn("無法使用此設定啟動相機:", constraints, err);
        }
      }
      alert("無法啟動相機。請檢查瀏覽器相機權限是否已開啟，或嘗試重新載入網頁。");
    }

    function takePhoto() {
      // 確保相機有影像才拍照
      if (!video.videoWidth || video.videoWidth === 0) {
        alert("相機未就緒，請確認畫面上是否有相機影像。");
        return;
      }

      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // 1. 畫相機畫面
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      // 2. 畫 PNG 相框
      context.drawImage(frame, 0, 0, canvas.width, canvas.height);

      // 轉為 Base64 提供預覽顯示
      const dataUrl = canvas.toDataURL('image/png');
      previewImg.src = dataUrl;
      previewContainer.style.display = 'flex';

      // 轉為 Blob 供儲存選單使用
      canvas.toBlob((blob) => {
        currentBlob = blob;
      }, 'image/png');
    }

    function closePreview() {
      previewContainer.style.display = 'none';
    }

    async function savePhoto() {
      if (!currentBlob) return;

      const file = new File([currentBlob], photo_${Date.now()}.png, { type: 'image/png' });

      // iOS Safari 及 Android Chrome 支援原生分享 API
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '我的相片'
          });
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
        }
      }

      // 如果不支援分享 API，備用普通下載
      fallbackDownload();
    }

    function fallbackDownload() {
      const a = document.createElement('a');
      a.href = previewImg.src;
      a.download = photo_${Date.now()}.png;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 頁面載入後自動啟動相機
    window.addEventListener('load', initCamera);
  </script>
</body>
</html>
